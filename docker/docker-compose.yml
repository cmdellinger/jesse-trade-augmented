services:
  jesse:
    build:
      context: ..
      dockerfile: Dockerfile
    command: jesse run
    ports:
      - "${APP_PORT:-9000}:${APP_PORT:-9000}"
      - "${LSP_PORT:-9001}:${LSP_PORT:-9001}"
    volumes:
      - ..:/jesse-docker
      - ../strategies:/home/strategies
      - ../storage:/home/storage
      - ../.env:/home/.env
    env_file:
      - ../.env
    working_dir: /home
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: jesse_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jesse_db
    volumes:
      - jesse-augment-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    command: redis-server --save "" --appendonly no

volumes:
  jesse-augment-postgres-data:
